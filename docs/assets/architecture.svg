<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">MiroFish KO OAuth Bridge Architecture</title>
  <desc id="desc">Frontend and backend of MiroFish talk to a local Codex bridge and Zep Cloud; users upload scenario documents and receive reports and interactions.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; }
      .boxA { fill: #1d4ed8; }
      .boxB { fill: #059669; }
      .boxC { fill: #7c3aed; }
      .boxD { fill: #ea580c; }
      .boxE { fill: #374151; }
      .txt { fill: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .small { font-size: 22px; }
      .body { font-size: 24px; }
      .title { font-size: 34px; font-weight: 700; }
      .label { font-size: 20px; font-weight: 600; }
      .arrow { stroke: #94a3b8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620" />
  <text class="txt title" x="60" y="70">MiroFish KO OAuth Bridge</text>
  <text class="txt body" x="60" y="108">Local scenario simulation stack with bilingual UI, Codex OAuth bridge, and Zep-backed graph memory.</text>

  <rect class="panel" x="50" y="150" width="300" height="210" />
  <text class="txt label" x="75" y="190">User Inputs</text>
  <text class="txt small" x="75" y="235">• Scenario markdown / PDFs</text>
  <text class="txt small" x="75" y="270">• Korean or English prompts</text>
  <text class="txt small" x="75" y="305">• Step-by-step simulation settings</text>

  <rect class="panel boxA" x="430" y="150" width="320" height="210" rx="18" />
  <text class="txt label" x="455" y="190">MiroFish Frontend</text>
  <text class="txt small" x="455" y="235">Vue UI, Korean/English switch</text>
  <text class="txt small" x="455" y="270">Scenario upload + step workflow</text>
  <text class="txt small" x="455" y="305">Report + agent interaction screens</text>

  <rect class="panel boxB" x="430" y="410" width="320" height="150" rx="18" />
  <text class="txt label" x="455" y="450">MiroFish Backend</text>
  <text class="txt small" x="455" y="490">Graph build, simulation orchestration,</text>
  <text class="txt small" x="455" y="523">report generation, API endpoints</text>

  <rect class="panel boxC" x="840" y="150" width="300" height="150" rx="18" />
  <text class="txt label" x="865" y="190">Local Codex Bridge</text>
  <text class="txt small" x="865" y="230">OpenAI-compatible local endpoint</text>
  <text class="txt small" x="865" y="263">uses local Codex / ChatGPT login</text>

  <rect class="panel boxD" x="840" y="350" width="300" height="150" rx="18" />
  <text class="txt label" x="865" y="390">Codex Runtime</text>
  <text class="txt small" x="865" y="430">Prompt execution through Codex OAuth</text>
  <text class="txt small" x="865" y="463">No direct OpenAI API key required</text>

  <rect class="panel boxE" x="840" y="530" width="300" height="60" rx="18" />
  <text class="txt label" x="865" y="568">Zep Cloud: graph / memory backend</text>

  <path class="arrow" d="M 350 255 L 430 255" />
  <path class="arrow" d="M 590 360 L 590 410" />
  <path class="arrow" d="M 750 255 L 840 225" />
  <path class="arrow" d="M 750 485 L 840 425" />
  <path class="arrow" d="M 990 300 L 990 350" />
  <path class="arrow dash" d="M 990 500 L 990 530" />
</svg>
